name: MediCheck
options:
  bundleIdPrefix: com.medicheck
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""

targets:
  MediCheck:
    type: application
    platform: iOS
    sources:
      - path: .
        type: group
        name: MediCheck
        excludes:
          - "*.md"
          - ".gitignore"
          - "project.yml"
          - "ExportOptions.plist"
          - ".github"
          - ".claude"
          - "build"
          - "DerivedData"
    settings:
      base:
        INFOPLIST_FILE: "Resources/Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.medicheck.app
        PRODUCT_NAME: MediCheck
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
