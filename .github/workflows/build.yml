name: Build MediCheck (Unsigned IPA)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "✅ Xcode project generated"

      # ============================================
      # 🔓 无签名编译
      # 输出未签名的原始 IPA，后续用 SideStore 重签名安装
      # 不需要 Apple Developer 付费账号
      # ============================================

      - name: Build and Archive (unsigned)
        run: |
          xcodebuild archive \
            -project MediCheck.xcodeproj \
            -scheme MediCheck \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ github.workspace }}/build/MediCheck.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            -verbose 2>&1 | tee xcodebuild_archive.log
        timeout-minutes: 30

      - name: Create unsigned IPA
        run: |
          APP_PATH="${{ github.workspace }}/build/MediCheck.xcarchive/Products/Applications/MediCheck.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found at expected path!"
            echo "Searching for .app in archive..."
            find "${{ github.workspace }}/build/MediCheck.xcarchive" -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "✅ Found: $APP_PATH"

          # 验证签名状态（应显示未签名）
          echo ""
          echo "🔍 签名状态检查："
          codesign -dv "$APP_PATH" 2>&1 || echo "   ✅ App 未签名（符合预期）"

          # 手动打包 IPA（Payload 方式，SideStore 兼容）
          mkdir -p "${{ github.workspace }}/build/Payload"
          cp -R "$APP_PATH" "${{ github.workspace }}/build/Payload/"

          cd "${{ github.workspace }}/build"
          zip -r -y "MediCheck.ipa" Payload/

          echo ""
          echo "📦 IPA 已生成："
          ls -lh "${{ github.workspace }}/build/MediCheck.ipa"
        timeout-minutes: 5

      - name: Rename IPA
        id: rename
        run: |
          BUILD_DATE=$(date +"%Y%m%d_%H%M%S")
          COMMIT_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          IPA_NAME="MediCheck_unsigned_${BUILD_DATE}_${COMMIT_SHORT}.ipa"
          mv "${{ github.workspace }}/build/MediCheck.ipa" "${{ github.workspace }}/build/${IPA_NAME}"
          echo "ipa_name=${IPA_NAME}" >> $GITHUB_OUTPUT
          echo "✅ $IPA_NAME"

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediCheck-${{ steps.rename.outputs.ipa_name }}
          path: ${{ github.workspace }}/build/${{ steps.rename.outputs.ipa_name }}
          retention-days: 90

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-debug
          path: xcodebuild_archive.log
          retention-days: 7

      - name: Upload IPA to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/build/${{ steps.rename.outputs.ipa_name }}
